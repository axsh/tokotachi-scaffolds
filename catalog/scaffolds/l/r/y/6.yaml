scaffolds:
    - name: kotoshiro-go-mcp
      category: feature
      description: Go Kotoshiro MCP Feature
      depends_on:
        - category: project
          name: axsh-go-standard
      template_ref: catalog/scaffolds/l/r/y/go-kotoshiro-mcp-feature.zip
      original_ref: catalog/originals/axsh/go-kotoshiro-mcp-feature
      template_params:
        - name: feature_name
          description: Feature name
          required: true
          default: myfunction
          old_value: ""
          value_spec:
            type: string
            length:
                max_bytes: 64
                max_chars: 32
            format:
                pattern: ^[a-z][a-z0-9_-]*$
        - name: module_path
          description: Go module path
          required: true
          default: github.com/axsh/tokotachi/features/myfunction
          old_value: ""
          value_spec:
            type: string
            length:
                max_bytes: 256
            format:
                pattern: ^[a-zA-Z0-9._/-]+$
